  #     interval: 15s
  #     timeout: 10s
  #     retries: 10

volumes:
  loki_data:
    driver: local
  promtail_positions:
    driver: local
  grafana_data:
    driver: local
  portainer_data:
    driver: local
  prometheus_data:
    driver: local
  postgres_data:
    driver: local
  uptime_kuma_data:
    driver: local
  elasticsearch_data:
    driver: local
